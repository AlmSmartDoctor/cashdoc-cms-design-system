name: Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
  push:
    branches:
      - main
    # package.json은 제외하지 않는다: 버전 bump 커밋(`chore(release):`)이
    # release_gate 정규식(^chore()에 걸려 스킵되므로 자기 트리거 루프는 이미
    # 막혀 있고(대가는 게이트서 조기종료되는 no-op run 1개), 제외하면
    # exports/peerDependencies/files 등 배포물에 영향 가는 package.json 단독
    # 변경이 토큰이 있어도 릴리즈되지 못하는 구멍이 생긴다.
    paths-ignore:
      - 'CHANGELOG.md'
      - '.github/**'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 릴리즈는 버전 bump 커밋을 main 에 직접 push 한다(아래 "Push changes").
          # 기본 GITHUB_TOKEN 은 관리자가 아니라서 main 브랜치 보호(PR 필수 / required status checks)에
          # 막힌다 — 보호를 켠 채로는 자동 릴리즈가 구조적으로 불가능하다.
          # 그래서 브랜치 보호를 우회할 수 있는 관리자 PAT(RELEASE_TOKEN)로 checkout 한다.
          # 이후 git push 는 checkout 이 심어둔 자격증명을 그대로 쓰므로 push 스텝은 손대지 않는다.
          # RELEASE_TOKEN 이 없으면 기존 동작(GITHUB_TOKEN)으로 폴백한다.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Evaluate release gate
        id: release_gate
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should-release=true" >> "$GITHUB_OUTPUT"
            echo "Release gate: manual dispatch"
            exit 0
          fi

          COMMIT_MESSAGE="$(git log -1 --pretty=%B | tr '[:upper:]' '[:lower:]')"
          SHOULD_RELEASE="true"

          if printf '%s\n' "$COMMIT_MESSAGE" | grep -Eq '(\[(docs|chore)\]|^(chore(\(|:)|docs(\(|:)|doc(\(|:)))'; then
            SHOULD_RELEASE="false"
          fi

          echo "should-release=${SHOULD_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "Release gate result: ${SHOULD_RELEASE}"

      - name: Skip release for chore/docs commit
        if: steps.release_gate.outputs.should-release != 'true'
        run: |
          echo "Skipping release because the latest commit indicates docs/chore (prefix or token)."

      - name: Setup pnpm
        if: steps.release_gate.outputs.should-release == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        if: steps.release_gate.outputs.should-release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Configure Git
        if: steps.release_gate.outputs.should-release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        if: steps.release_gate.outputs.should-release == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.release_gate.outputs.should-release == 'true'
        run: pnpm build

      - name: Determine release type
        if: steps.release_gate.outputs.should-release == 'true'
        id: release_type
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TYPE="${{ github.event.inputs.release-type }}"
          else
            COMMIT_MESSAGE="$(git log -1 --pretty=%B | tr '[:upper:]' '[:lower:]')"
            RELEASE_TYPE="patch"

            if printf '%s\n' "$COMMIT_MESSAGE" | grep -q '\[major\]'; then
              RELEASE_TYPE="major"
            elif printf '%s\n' "$COMMIT_MESSAGE" | grep -q '\[minor\]'; then
              RELEASE_TYPE="minor"
            elif printf '%s\n' "$COMMIT_MESSAGE" | grep -q '\[patch\]'; then
              RELEASE_TYPE="patch"
            fi
          fi

          echo "release-type=${RELEASE_TYPE}" >> "$GITHUB_OUTPUT"
          echo "Selected release type: ${RELEASE_TYPE}"

      - name: Bump version and generate changelog
        if: steps.release_gate.outputs.should-release == 'true'
        run: |
          set -euo pipefail

          RELEASE_TYPE="${{ steps.release_type.outputs.release-type }}"

          case "$RELEASE_TYPE" in
            major)
              pnpm release:major
              ;;
            minor)
              pnpm release:minor
              ;;
            patch|"")
              pnpm release:patch
              ;;
            *)
              echo "::error::Unsupported release type: $RELEASE_TYPE"
              exit 1
              ;;
          esac

      - name: Push changes
        if: steps.release_gate.outputs.should-release == 'true'
        run: |
          git push --follow-tags origin main

      - name: Get version
        if: steps.release_gate.outputs.should-release == 'true'
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Setup Node.js for trusted publishing
        if: steps.release_gate.outputs.should-release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to NPM
        if: steps.release_gate.outputs.should-release == 'true'
        run: npm publish --access public

      - name: Create GitHub Release
        if: steps.release_gate.outputs.should-release == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          body: |
            🎉 New version released!

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false
