name: Screenshots

on:
  push:
    branches: [main]
    paths-ignore:
      - "__screenshots__/**"
  workflow_dispatch:

concurrency:
  group: screenshots-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  capture-screenshots:
    name: Capture Component Screenshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Capture screenshots
        run: pnpm run screenshot:ci

      - name: Debug screenshots
        run: |
          ls -R __screenshots__ || echo "Screenshots directory not found"
          find __screenshots__ -name "*.png" | wc -l

      - name: Push Screenshots to External Repository
        env:
          SCREENSHOT_REPO: AlmSmartDoctor/ccds-screenshots
          SCREENSHOT_TOKEN: ${{ secrets.SCREENSHOT_REPO_TOKEN }}
        run: |
          # 별도 레포 설정
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 임시 디렉토리에 클론
          cd /tmp
          git clone https://x-access-token:${SCREENSHOT_TOKEN}@github.com/${SCREENSHOT_REPO}.git screenshots-repo
          cd screenshots-repo

          # 스크린샷 복사
          rm -rf screenshots/*
          mkdir -p screenshots
          cp -r ${{ github.workspace }}/__screenshots__/* screenshots/

          # 커밋 및 푸시
          git add screenshots/
          git commit -m "chore: update screenshots from ${{ github.repository }}@${{ github.sha }}" || echo "No changes to commit"
          git push